<!-- Mobile: slider horizontal de tarjetas (se asoma la siguiente) -->
<swiper-container #swiperContainer slides-per-view="1.25" space-between="10" free-mode="true" auto-height="true"
    class="block px-2 lg:hidden">
    @for (preset of presets; track preset.plan) {
    <swiper-slide class="h-auto items-stretch">
        <ng-container [ngTemplateOutlet]="cardTpl" [ngTemplateOutletContext]="{ $implicit: preset }"></ng-container>
    </swiper-slide>
    }
</swiper-container>

<!-- Desktop: grid 3x2 ocupando todo el ancho -->
<div class="hidden w-full lg:grid lg:grid-cols-3 lg:gap-3">
    @for (preset of presets; track preset.plan) {
    <ng-container [ngTemplateOutlet]="cardTpl" [ngTemplateOutletContext]="{ $implicit: preset }"></ng-container>
    }
</div>

<!-- Tarjeta de rutina (compartida mobile/desktop) -->
<ng-template #cardTpl let-preset>
    <div class="card bg-base-100 shadow-sm overflow-hidden h-full w-full">
        <!-- Cabecera: inicia la rutina al pulsar -->
        <button type="button"
            class="ion-activatable ripple-parent card-body p-3 flex flex-row items-center justify-between gap-2 text-left w-full cursor-pointer hover:bg-base-200/40 transition-colors"
            (click)="createPlan(preset.plan)">
            <ion-ripple-effect></ion-ripple-effect>
            <div class="flex items-center gap-3 min-w-0">
                <ion-icon [name]="categoryIconFor(preset)" class="text-2xl text-primary shrink-0"></ion-icon>
                <div class="min-w-0">
                    <div class="font-semibold leading-tight">
                        {{ ('TRAINING.categories.' + preset.category) | transloco }}
                    </div>
                    <div class="flex items-center gap-1 text-xs text-base-content/70">
                        {{ preset.minutes }} <ion-icon name="timer-outline"></ion-icon>
                    </div>
                </div>
            </div>
            <div class="text-sm font-medium shrink-0" [class.opacity-50]="isEloProvisional(preset.plan)">
                {{ getEloDisplayForPlan(preset.plan) }}
            </div>
        </button>

        <!-- Descripción de la rutina -->
        <p class="px-3 pb-2 text-xs text-base-content/70">
            {{ preset.summaryKey | transloco }}
        </p>

        <!-- Acordeón: qué entrenas (no crea la rutina) -->
        <div class="collapse collapse-arrow border-t border-base-200 rounded-none">
            <input type="checkbox" aria-label="toggle" (change)="onAccordionToggle()" />
            <div class="collapse-title text-xs font-medium py-2 min-h-0">
                {{ 'TRAINING.viewBlocks' | transloco }} ({{ preset.phaseKeys.length }})
            </div>
            <div class="collapse-content text-xs">
                <ul class="space-y-1">
                    @for (key of preset.phaseKeys; track key) {
                    <li class="flex items-start gap-2 text-base-content/70">
                        <span class="text-primary leading-none">•</span>
                        <span>{{ key | transloco }}</span>
                    </li>
                    }
                </ul>
            </div>
        </div>
    </div>
</ng-template>
