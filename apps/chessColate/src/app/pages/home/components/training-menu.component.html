<!-- Mobile: swiper carousel -->
<swiper-container slides-per-view="2.7" space-between="5" free-mode="true" class="ml-2 lg:hidden">
    @for (plan of [1,3,5,10,20,30]; track plan) {
    <swiper-slide (click)="createPlan(plan)">

        <div class="ion-activatable  ripple-parent rectangle">
            <ion-ripple-effect></ion-ripple-effect>
            <div class="card bg-base-100">
                <figure class="p-2">
                    <img src="assets/images/plan-icons/plan{{plan}}.png" alt="plan{{plan}}" />
                </figure>
                <div class="card-body p-2 flex flex-row justify-between  w-full">
                    <div class="text-sm text-left" [class.text-base-content/50]="isEloProvisional(plan)">
                        {{ getEloDisplayForPlan(plan) }}
                    </div>
                    <div class="card-actions">
                        <div class="flex  gap-1">
                            {{plan}} <ion-icon name="timer-outline"></ion-icon>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </swiper-slide>
    }
</swiper-container>

<!-- Desktop: 3x2 grid -->
<div class="hidden lg:grid lg:grid-cols-3 lg:gap-3">
    @for (plan of [1,3,5,10,20,30]; track plan) {
    <div
        class="card bg-base-100 shadow-sm cursor-pointer hover:shadow-md hover:-translate-y-0.5 transition-all active:scale-[0.98]"
        (click)="createPlan(plan)">
        <figure class="p-4">
            <img src="assets/images/plan-icons/plan{{plan}}.png" alt="plan{{plan}}" class="h-24 lg:h-36 w-auto object-contain" />
        </figure>
        <div class="card-body p-3 pt-0 flex flex-row justify-between items-center w-full">
            <div class="text-sm font-medium" [class.opacity-50]="isEloProvisional(plan)">
                {{ getEloDisplayForPlan(plan) }}
            </div>
            <div class="flex items-center gap-1 text-sm text-base-content/70">
                {{ plan }} <ion-icon name="timer-outline"></ion-icon>
            </div>
        </div>
    </div>
    }
</div>
