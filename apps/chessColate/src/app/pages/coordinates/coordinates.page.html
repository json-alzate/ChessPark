<ion-content [fullscreen]="true">
  <div class="main-container" data-theme="halloween">

    <app-navbar></app-navbar>

    <div class="container mx-auto px-2 pb-6 lg:px-6">

      <!-- Header con navegación y título — mismo ancho centrado que el cuerpo -->
      <div class="mb-4 lg:max-w-[872px] lg:mx-auto">
        <div class="flex items-center justify-between mb-2">
          <div class="breadcrumbs">
            <ul>
              <li>
                <a (click)="goToHome()" class="cursor-pointer text-sm gap-2">
                  <ion-icon name="home-outline" class="h-4 w-4"></ion-icon>
                  <span>{{ 'MENU.navigation.home' | transloco }}</span>
                </a>
              </li>
            </ul>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <h2 class="text-2xl font-bold transition-all duration-300">
            {{ 'COORDINATES.title' | transloco }}
          </h2>
          <button class="btn btn-circle btn-ghost btn-sm" id="settings-trigger">
            <ion-icon name="settings-outline" class="text-xl"></ion-icon>
          </button>
        </div>
      </div>

      <!-- Body: 1 columna en mobile, 2 columnas en desktop -->
      <div class="lg:flex lg:justify-center lg:gap-8 lg:items-start">

        <!-- COLUMNA IZQUIERDA: Tablero + Timer -->
        <div class="lg:w-[480px] lg:flex-shrink-0">
          <!-- Wrapper relative para el overlay del puzzle actual -->
          <div class="relative">
            <lib-board (squareSelected)="onSquareSelected($event)"></lib-board>
            @if (currentPuzzle) {
            <h1 class="current-puzzle">{{ currentPuzzle }}</h1>
            }
          </div>

          <!-- Timer -->
          <app-timer [time]="time" [progressValue]="progressValue" [timeColor]="timeColor"
            [infiniteMode]="gameSettings.infiniteMode"></app-timer>
        </div>

        <!-- COLUMNA DERECHA: Controles -->
        <div class="flex flex-col gap-2 mt-2 lg:mt-0 lg:w-[360px] lg:flex-shrink-0">

          <!-- Controles de orientación (solo si !isPlaying) -->
          <app-board-orientation-controls [boardOrientation]="boardOrientation" [isPlaying]="isPlaying"
            (orientationChange)="changeBoardOrientation($event)"></app-board-orientation-controls>

          @if (isPlaying) {
          <!-- Avatar del Rey -->
          <app-king-avatar [currentColorInBoard]="currentColorInBoard" [showLabel]="true" [showRecord]="true"
            size="md"
            [bestScore]="getBestScoreByColor(currentColorInBoard === 'white' ? 'w' : 'b')"></app-king-avatar>
          }

          @if (!isPlaying) {
          <button class="btn btn-lg btn-primary w-full" (click)="play()">
            {{ 'COORDINATES.actions.play' | transloco }}
          </button>

          <!-- Scoreboard -->
          <app-scoreboard [bestScores]="bestScores" [userStats]="userStats"></app-scoreboard>
          }

          <!-- Estadísticas del juego actual -->
          <app-game-stats [currentGameStats]="currentGameStats" [isPlaying]="isPlaying"></app-game-stats>

          @if (isPlaying && gameSettings.infiniteMode) {
          <div class="flex justify-center" (click)="stopGame()">
            <button class="btn btn-error w-50">
              {{ 'COORDINATES.actions.stopGame' | transloco }}
            </button>
          </div>
          }
        </div>

      </div>
    </div>
  </div>

  <!-- Modal de Resultados -->
  <app-game-results-modal #resultsModal [isNewRecord]="isNewRecord" [recordType]="recordType" [score]="score"
    [squaresGood]="squaresGood" [squaresBad]="squaresBad" [currentColorInBoard]="currentColorInBoard"
    [currentGameStats]="currentGameStats"
    [bestScoreByColor]="getBestScoreByColor(currentColorInBoard === 'white' ? 'w' : 'b')"
    (closeModal)="closeResultsModal()"></app-game-results-modal>

  <!-- Menú Lateral de Configuración -->
  <app-settings-side-menu [settings]="gameSettings" [isPlaying]="isPlaying" [appVersion]="'v1.0.2'"
    (settingsChange)="onSettingsChange($event)"></app-settings-side-menu>

</ion-content>
