<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChessColate</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <img src="icons/icon48.png" alt="ChessColate" class="brand-icon" />
      <span class="brand-name">ChessColate</span>
    </div>
    <button id="btn-signout" class="btn btn-ghost btn-sm" style="display:none">Sign out</button>
  </header>

  <!-- Auth section -->
  <section id="section-auth" class="section">
    <div id="auth-logged-out">
      <p class="text-muted">Sign in to sync your ELO and plans.</p>
      <button id="btn-signin" class="btn btn-primary btn-block">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
      <p id="auth-error" class="text-error" style="display:none"></p>
    </div>

    <div id="auth-logged-in" style="display:none">
      <div class="user-info">
        <div class="user-details">
          <span id="user-name" class="user-name"></span>
          <span id="user-email" class="user-email"></span>
        </div>
        <div class="elo-badge" id="elo-badge" style="display:none">
          <span class="elo-label">ELO</span>
          <span id="user-elo" class="elo-value">—</span>
        </div>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- Piece highlights section -->
  <section class="section">
    <h2 class="section-title">Piece Highlights <span class="lichess-tag">Lichess</span></h2>
    <table class="highlights-table">
      <thead>
        <tr>
          <th></th>
          <th class="color-header white-header">White</th>
          <th class="color-header black-header">Black</th>
        </tr>
      </thead>
      <tbody id="highlights-body">
        <!-- Rows inserted by popup.ts -->
      </tbody>
    </table>
  </section>

  <div class="divider"></div>

  <!-- Plans section -->
  <section class="section">
    <h2 class="section-title">Default Plans</h2>
    <div id="plans-container">
      <p class="text-muted" id="plans-loading">Loading plans…</p>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
